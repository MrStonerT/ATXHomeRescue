<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Page not found — ATX Home Rescue</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'; frame-src 'none'; connect-src 'self' https://ranger-api.atxhomerescue.workers.dev http://localhost:8787; object-src 'none'; base-uri 'self'; form-action 'self';"/>
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
<link rel="icon" href="assets/logo.png"/>
<link rel="stylesheet" href="styles/tokens.css"/>
<link rel="stylesheet" href="styles/base.css"/>
<link rel="stylesheet" href="styles/layout.css"/>
<link rel="stylesheet" href="styles/ranger.css"/>
<style>
  .not-found {
    min-height: calc(100vh - 74px);
    display: flex; align-items: center; justify-content: center;
    padding: 60px 28px; text-align: center;
  }
  .not-found .card {
    background: #fff; border: 1px solid var(--rule);
    padding: 48px 40px; max-width: 480px; width: 100%;
  }
  .not-found .code {
    font-family: 'Anton'; font-size: 120px; line-height: 1;
    color: var(--orange); letter-spacing: .02em; margin: 0 0 4px;
  }
  .not-found h1 {
    font-family: 'Anton'; font-size: 36px; text-transform: uppercase;
    letter-spacing: .01em; margin: 0 0 14px; line-height: 1;
  }
  .not-found p {
    color: var(--ink-soft); font-size: 16px; line-height: 1.5; margin: 0 0 28px;
  }
  .not-found .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>

<header class="site">
  <div class="container nav">
    <a href="index.html" class="brand">
      <img src="assets/logo.png" alt="ATX Home Rescue"/>
      <div>
        <div class="wordmark">ATX Home Rescue</div>
        <div class="tag">Repair · Remodel · Reclaim</div>
      </div>
    </a>
    <button class="lang-toggle" id="langToggle" aria-label="Language" style="margin-left:auto"><span class="lang-flag">EN</span> / <span class="lang-flag off">ES</span></button>
  </div>
</header>

<div class="not-found">
  <div class="card">
    <div class="code">404</div>
    <h1 data-i18n="404.h">Lost the trail?</h1>
    <p data-i18n="404.p">This page isn't here — maybe a typo, or it moved. Try one of these:</p>
    <div class="actions">
      <a href="index.html" class="btn lg" data-i18n="404.home">← Back to home</a>
      <a href="booking.html" class="btn lg ghost" data-i18n="404.book">Start with Ranger →</a>
    </div>
  </div>
</div>

<script src="scripts/i18n.js"></script>
<script src="scripts/legal-and-404.js"></script>
<script src="scripts/ranger-shared.js"></script>
<script src="scripts/ranger-agent.js"></script>
<script src="scripts/ranger-widget.js" defer></script>
</body>
</html>
