<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Book your rescue — ATX Home Rescue</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'; frame-src https://clienthub.getjobber.com; connect-src 'self' https://ranger-api.atxhomerescue.workers.dev http://localhost:8787; object-src 'none'; base-uri 'self'; form-action 'self';"/>
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin"/>
<meta name="description" content="Book a flat-priced handyman rescue in Northwest Austin. Describe your project, get a price, and pick a same-week slot."/>
<meta name="robots" content="noindex"/>
<link rel="canonical" href="https://atxhomerescue.com/booking.html"/>
<link rel="icon" href="assets/logo.png"/>
<link rel="apple-touch-icon" href="assets/logo.png"/>
<link rel="stylesheet" href="styles/tokens.css"/>
<link rel="stylesheet" href="styles/base.css"/>
<link rel="stylesheet" href="styles/layout.css"/>
<link rel="stylesheet" href="styles/booking.css"/>
<link rel="stylesheet" href="styles/ranger.css"/>
</head>
<body>

<header class="site">
  <div class="nav" style="max-width:1240px;margin:0 auto;padding:0 28px">
    <a href="index.html" class="brand">
      <img src="assets/logo.png" alt="ATX Home Rescue"/>
      <div>
        <div class="wordmark">ATX Home Rescue</div>
        <div class="tag">Repair · Remodel · Reclaim</div>
      </div>
    </a>
    <a href="index.html" class="back" id="backLink">← Back to site</a>
    <button class="lang-toggle" id="langToggle" aria-label="Language" style="margin-left:auto">
      <span class="lang-flag">EN</span> / <span class="lang-flag off">ES</span>
    </button>
  </div>
</header>

<section class="progress">
  <div class="steps" id="steps"></div>
</section>

<main class="shell">
  <!-- CHAT SIDE — Ranger Agent mounts here -->
  <section class="panel chat-wrap" id="chatWrap"></section>

  <!-- SUMMARY SIDE -->
  <aside class="summary">
    <div class="panel">
      <div class="sum-eyebrow" id="sumEyebrow">Your rescue · flat quote</div>
      <h2 class="sum-title" id="sumTitle">—</h2>
      <div class="sum-price" id="sumPrice">—</div>
      <div class="sum-meta" id="sumMeta">Ranger will match this</div>

      <div class="sum-section" id="sumDetailsSec" style="display:none">
        <h4 id="sumDetailsLbl">What Ranger knows</h4>
        <div id="sumDetails" class="sum-details"></div>
      </div>

      <div class="sum-section" id="sumInclSec" style="display:none">
        <h4 id="inclLbl">What's included</h4>
        <ul class="sum-list" id="sumIncl"></ul>
      </div>

      <div class="sum-section" id="sumPhotoSec" style="display:none">
        <h4 id="photoLbl">Photos shared</h4>
        <div class="uploads" id="sumPhotos"></div>
      </div>

      <div class="sum-section" id="sumContactSec" style="display:none">
        <h4 id="contactLbl">Your info</h4>
        <div id="sumContact"></div>
      </div>

      <div class="sum-section" style="color:var(--ink-soft);font-size:12px;line-height:1.5">
        <div id="sumNote">Flat price. Materials included. Reschedule anytime. Powered by Jobber.</div>
      </div>
    </div>
  </aside>
</main>

<script src="scripts/i18n.js"></script>
<script src="scripts/jobber-config.js"></script>
<script src="scripts/ranger-shared.js"></script>
<script src="scripts/ranger-agent.js"></script>
<script src="scripts/booking.js"></script>
</body>
</html>
